<!DOCTYPE html>
<html>
<head>
  <title>Add Item to List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    
    button:hover {
      background-color: #45a049;
    }
    
    .my_list {
      list-style: none;
      padding: 0;
    }
    
    .my_list li {
      padding: 10px;
      background-color: #f0f0f0;
      margin: 5px 0;
      border-left: 4px solid #4CAF50;
    }
  </style>
</head>
<body>
  <h1>Add Items to List</h1>
  
  <button id="add_item">Add Item</button>
  
  <ul class="my_list">
    <li>Item</li>
  </ul>
  
  <script src="4-script.js"></script>
</body>
</html>
